<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Admin Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- DataTables Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">

    <link rel="stylesheet" href="../assets/css/app.css">
</head>

<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand text-center py-3">
                <a href="index.html" class="text-decoration-none d-block">
                    <img src="../../../images/logo.png" alt="Logo" class="img-fluid px-3" style="max-height: 55px;">
                </a>
            </div>
            <ul class="sidebar-nav list-unstyled p-3">
                <li class="sidebar-item mb-2">
                    <a href="index.html" class="sidebar-link rounded p-2 d-block text-white text-decoration-none">
                        <i class="fa-solid fa-house me-2"></i> <span>Dashboard</span>
                    </a>
                </li>
                <li class="sidebar-item mb-2">
                    <a href="users.html"
                        class="sidebar-link active rounded p-2 d-block text-white text-decoration-none">
                        <i class="fa-solid fa-users me-2"></i> <span>Users</span>
                    </a>
                </li>
                <li class="sidebar-item mb-2">
                    <a href="form.html" class="sidebar-link rounded p-2 d-block text-white text-decoration-none">
                        <i class="fa-solid fa-wpforms me-2"></i> <span>Forms</span>
                    </a>
                </li>
            </ul>
        </aside>

        <div class="main">
            <header class="header px-4 py-3 bg-white shadow-sm d-flex align-items-center justify-content-between">
                <button class="btn btn-light toggle-sidebar" id="toggle-sidebar">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="dropdown">
                    <button class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        <i class="fa-regular fa-user-circle me-1"></i> Admin
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
                    </ul>
                </div>
            </header>

            <main class="content p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h4 mb-0">Manage Users</h2>
                    <button class="btn btn-dark"><i class="fa-solid fa-plus me-1"></i> Add User</button>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle w-100" id="usersTable">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th>Status</th>
                                        <th>Created At</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>1</td>
                                        <td>Alex Johnson</td>
                                        <td>alex@example.com</td>
                                        <td>Admin</td>
                                        <td><span class="badge bg-success">Active</span></td>
                                        <td>2023-01-15</td>
                                        <td>
                                            <button class="btn btn-sm btn-light text-primary border me-1"><i
                                                    class="fa-solid fa-pen-to-square"></i></button>
                                            <button class="btn btn-sm btn-light text-danger border btn-delete"><i
                                                    class="fa-solid fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>2</td>
                                        <td>Bob Smith</td>
                                        <td>bob@example.com</td>
                                        <td>Editor</td>
                                        <td><span class="badge bg-warning text-dark">Suspended</span></td>
                                        <td>2023-03-22</td>
                                        <td>
                                            <button class="btn btn-sm btn-light text-primary border me-1"><i
                                                    class="fa-solid fa-pen-to-square"></i></button>
                                            <button class="btn btn-sm btn-light text-danger border btn-delete"><i
                                                    class="fa-solid fa-trash"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>

            <footer class="footer mt-auto p-4 bg-white text-muted text-center border-top">
                &copy; <span id="year"></span> PRABHAKALA E-BOOKING
            </footer>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="../assets/js/app.js"></script>
</body>

</html>
